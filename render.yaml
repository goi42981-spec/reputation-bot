# Render deployment manifest.
# Used by render.com Blueprints: https://render.com/docs/blueprint-spec
#
# What this declares:
#   - A free-tier Python web service that runs the bot in webhook mode.
#   - Required secrets (BOT_TOKEN, DATABASE_URL) — set them in the Render
#     dashboard before the first deploy.
#   - Health check at `/healthz` so Render can confirm the service is live
#     and so UptimeRobot has a stable URL to ping.
#
# Storage: Render's free tier has an ephemeral filesystem. For persistent
# reputation data we use a hosted Postgres provider (e.g. Neon's free
# tier) and pass the connection string via DATABASE_URL. If DATABASE_URL
# is unset, the bot falls back to SQLite at DB_PATH (data lost on every
# redeploy).

services:
  - type: web
    name: reputation-bot
    runtime: docker
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: "8000"
      # Optional env vars (set in the Render dashboard, not declared here):
      #   WEBHOOK_URL    — override the auto-derived $RENDER_EXTERNAL_URL.
      #   ALLOWED_CHAT_IDS — comma-separated whitelist of Telegram chat IDs.
      #                      Unset = allow any chat; set to lock the bot to
      #                      specific groups. Use /chatid to discover an ID.
